openapi: 3.1.0

info:
  title: RF Site Planning API
  version: 0.2.0-draft
  summary: Self-hosted, single-tenant RF propagation analysis for site planning.
  description: |
    Companion contract to design spec v2 (2026-04-25-rf-site-planning-api-design.md).

    - Auth: API key in the standard `Authorization: Bearer <api-key>` header (§2.3, [ADR-0002 §2](../../adr/0002-argus-alignment-and-auth.md)).
    - Sharing: per-tenant `private` / `shared` flag, no cross-key references.
    - Run lifecycle: SUBMITTED → QUEUED → RUNNING → COMPLETED|PARTIAL|FAILED|CANCELLED|EXPIRED (§8.1).
    - Storage: per-class TTLs (§8.2). Canonical artifacts persist to TTL; derivatives are 24 h cache.
    - Mode selection: `auto` selects async for area/multi_link/multi_tx/voxel ops or large geometries; sync responses bounded by `sync_budget_seconds` and auto-promote to async (HTTP 202) on overrun.
    - Errors and warnings codes are enumerated in spec Appendix D and reproduced in `ProblemDetail.code` and `ProblemDetail.warnings[].code`.

servers:
  - url: https://{host}/v1
    variables:
      host:
        default: rf.local
        description: Deployment hostname.

security:
  - BearerAuth: []

tags:
  - { name: catalog,      description: Named, versioned, sharable catalog entities. }
  - { name: assets,       description: Content-addressed binary blob upload/download (§3.5). }
  - { name: analyses,     description: Analysis submission endpoints (§4, §6). }
  - { name: runs,         description: Run lifecycle, artifacts, replay, slicing (§8.1, §8.9). }
  - { name: measurements, description: Field measurement ingest (§7). }
  - { name: webhooks,     description: Async run notifications (§2.4). }
  - { name: ops,          description: Health, readiness, metrics. }

paths:

  # ── Sites ────────────────────────────────────────────────────────────
  /sites:
    get:
      tags: [catalog]
      operationId: listSites
      description: 'Required scope: `catalog.read`.'
      parameters:
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/FilterName' }
        - { $ref: '#/components/parameters/FilterTag' }
        - { $ref: '#/components/parameters/FilterShare' }
      responses:
        '200': { $ref: '#/components/responses/PageOfSites' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
    post:
      tags: [catalog]
      operationId: createSite
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Site' } } } }
      responses:
        '201': { description: Created.,         content: { application/json: { schema: { $ref: '#/components/schemas/Site' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /sites/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:
      tags: [catalog]
      operationId: getSite
      description: 'Required scope: `catalog.read`.'
      responses:
        '200': { description: Site., content: { application/json: { schema: { $ref: '#/components/schemas/Site' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [catalog]
      operationId: updateSite
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Site' } } } }
      responses: { '200': { description: Updated. }, '404': { $ref: '#/components/responses/NotFound' } }
    delete:
      tags: [catalog]
      operationId: deleteSite
      description: 'Required scope: `catalog.write`.'
      responses: { '204': { description: Soft-deleted. }, '404': { $ref: '#/components/responses/NotFound' } }

  # ── Antennas ─────────────────────────────────────────────────────────
  /antennas:
    get:
      tags: [catalog]
      operationId: listAntennas
      description: 'Required scope: `catalog.read`.'
      parameters:
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/FilterName' }
        - { $ref: '#/components/parameters/FilterShare' }
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfAntennas' } } } } }
    post:
      tags: [catalog]
      operationId: createAntenna
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Antenna' } } } }
      responses: { '201': { description: Created. }, '400': { $ref: '#/components/responses/BadRequest' } }
  /antennas/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [catalog], operationId: getAntenna, description: 'Required scope: `catalog.read`.',    responses: { '200': { description: Antenna., content: { application/json: { schema: { $ref: '#/components/schemas/Antenna' } } } }, '404': { $ref: '#/components/responses/NotFound' } } }
    patch:  { tags: [catalog], operationId: updateAntenna, description: 'Required scope: `catalog.write`.', requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Antenna' } } } }, responses: { '200': { description: Updated. }, '404': { $ref: '#/components/responses/NotFound' } } }
    delete: { tags: [catalog], operationId: deleteAntenna, description: 'Required scope: `catalog.write`.', responses: { '204': { description: Soft-deleted. }, '404': { $ref: '#/components/responses/NotFound' } } }

  # ── Radio Profiles ───────────────────────────────────────────────────
  /radio-profiles:
    get:
      tags: [catalog]
      operationId: listRadioProfiles
      description: 'Required scope: `catalog.read`.'
      parameters: [{ $ref: '#/components/parameters/Cursor' }, { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/FilterName' }, { $ref: '#/components/parameters/FilterShare' }]
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfRadioProfiles' } } } } }
    post:
      tags: [catalog]
      operationId: createRadioProfile
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RadioProfile' } } } }
      responses: { '201': { description: Created. } }
  /radio-profiles/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [catalog], operationId: getRadioProfile, description: 'Required scope: `catalog.read`.',    responses: { '200': { description: RadioProfile., content: { application/json: { schema: { $ref: '#/components/schemas/RadioProfile' } } } } } }
    patch:  { tags: [catalog], operationId: updateRadioProfile, description: 'Required scope: `catalog.write`.', requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RadioProfile' } } } }, responses: { '200': { description: Updated. } } }
    delete: { tags: [catalog], operationId: deleteRadioProfile, description: 'Required scope: `catalog.write`.', responses: { '204': { description: Soft-deleted. } } }

  # ── Equipment Profiles ───────────────────────────────────────────────
  /equipment-profiles:
    get:
      tags: [catalog]
      operationId: listEquipmentProfiles
      description: 'Required scope: `catalog.read`.'
      parameters: [{ $ref: '#/components/parameters/Cursor' }, { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/FilterName' }, { $ref: '#/components/parameters/FilterTag' }, { $ref: '#/components/parameters/FilterShare' }]
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfEquipmentProfiles' } } } } }
    post:
      tags: [catalog]
      operationId: createEquipmentProfile
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/EquipmentProfile' } } } }
      responses: { '201': { description: Created. } }
  /equipment-profiles/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [catalog], operationId: getEquipmentProfile, description: 'Required scope: `catalog.read`.',    responses: { '200': { description: EquipmentProfile., content: { application/json: { schema: { $ref: '#/components/schemas/EquipmentProfile' } } } } } }
    patch:  { tags: [catalog], operationId: updateEquipmentProfile, description: 'Required scope: `catalog.write`.', requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/EquipmentProfile' } } } }, responses: { '200': { description: Updated. } } }
    delete: { tags: [catalog], operationId: deleteEquipmentProfile, description: 'Required scope: `catalog.write`.', responses: { '204': { description: Soft-deleted. } } }

  # ── AOI Packs ────────────────────────────────────────────────────────
  /aoi-packs:
    get:
      tags: [catalog]
      operationId: listAOIPacks
      description: 'Required scope: `catalog.read`.'
      parameters: [{ $ref: '#/components/parameters/Cursor' }, { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/FilterName' }, { $ref: '#/components/parameters/FilterTag' }, { $ref: '#/components/parameters/FilterShare' }]
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfAOIPacks' } } } } }
    post:
      tags: [catalog]
      operationId: createAOIPack
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AOIPack' } } } }
      responses:
        '201': { description: Created.,                         content: { application/json: { schema: { $ref: '#/components/schemas/AOIPack' } } } }
        '207': { description: Created with FETCHED_LAYER_PARTIAL warnings., content: { application/json: { schema: { $ref: '#/components/schemas/AOIPack' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /aoi-packs/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [catalog], operationId: getAOIPack, description: 'Required scope: `catalog.read`.',    responses: { '200': { description: AOIPack., content: { application/json: { schema: { $ref: '#/components/schemas/AOIPack' } } } } } }
    patch:
      tags: [catalog]
      operationId: updateAOIPack
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AOIPack' } } } }
      responses: { '200': { description: Updated (e.g., to retry a failed fetched layer). } }
    delete: { tags: [catalog], operationId: deleteAOIPack, description: 'Required scope: `catalog.write`.', responses: { '204': { description: Soft-deleted. } } }

  # ── Clutter Tables ───────────────────────────────────────────────────
  /clutter-tables:
    get:
      tags: [catalog]
      operationId: listClutterTables
      description: 'Required scope: `catalog.read`.'
      parameters: [{ $ref: '#/components/parameters/Cursor' }, { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/FilterName' }, { $ref: '#/components/parameters/FilterShare' }]
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfClutterTables' } } } } }
    post:
      tags: [catalog]
      operationId: createClutterTable
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ClutterTable' } } } }
      responses: { '201': { description: Created. } }
  /clutter-tables/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [catalog], operationId: getClutterTable, description: 'Required scope: `catalog.read`.',    responses: { '200': { description: ClutterTable., content: { application/json: { schema: { $ref: '#/components/schemas/ClutterTable' } } } } } }
    patch:  { tags: [catalog], operationId: updateClutterTable, description: 'Required scope: `catalog.write`.', requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ClutterTable' } } } }, responses: { '200': { description: Updated. } } }
    delete: { tags: [catalog], operationId: deleteClutterTable, description: 'Required scope: `catalog.write`.', responses: { '204': { description: Soft-deleted. } } }

  # ── Operating Volumes ────────────────────────────────────────────────
  /operating-volumes:
    get:
      tags: [catalog]
      operationId: listOperatingVolumes
      description: 'Required scope: `catalog.read`.'
      parameters: [{ $ref: '#/components/parameters/Cursor' }, { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/FilterName' }, { $ref: '#/components/parameters/FilterTag' }, { $ref: '#/components/parameters/FilterShare' }]
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfOperatingVolumes' } } } } }
    post:
      tags: [catalog]
      operationId: createOperatingVolume
      description: 'Required scope: `catalog.write`.'
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingVolume' } } } }
      responses: { '201': { description: Created. } }
  /operating-volumes/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [catalog], operationId: getOperatingVolume, description: 'Required scope: `catalog.read`.',    responses: { '200': { description: OperatingVolume., content: { application/json: { schema: { $ref: '#/components/schemas/OperatingVolume' } } } } } }
    patch:  { tags: [catalog], operationId: updateOperatingVolume, description: 'Required scope: `catalog.write`.', requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OperatingVolume' } } } }, responses: { '200': { description: Updated. } } }
    delete: { tags: [catalog], operationId: deleteOperatingVolume, description: 'Required scope: `catalog.write`.', responses: { '204': { description: Soft-deleted. } } }

  # ── Regulatory Profiles ──────────────────────────────────────────────
  /regulatory-profiles:
    get:
      tags: [catalog]
      operationId: listRegulatoryProfiles
      description: 'Required scope: `catalog.read`.'
      parameters: [{ $ref: '#/components/parameters/Cursor' }, { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/FilterName' }, { $ref: '#/components/parameters/FilterShare' }]
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfRegulatoryProfiles' } } } } }
    post:
      tags: [catalog]
      operationId: createRegulatoryProfile
      description: |
        Required scope: `catalog.write`.
        Per-jurisdiction band/EIRP/license-class rules (spec §3.7).
        Operator-curated; the system ships no bundled regulatory profiles.
        Advisory only — does not constitute licensing advice.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RegulatoryProfile' } } } }
      responses: { '201': { description: Created. } }
  /regulatory-profiles/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [catalog], operationId: getRegulatoryProfile, description: 'Required scope: `catalog.read`.',    responses: { '200': { description: RegulatoryProfile., content: { application/json: { schema: { $ref: '#/components/schemas/RegulatoryProfile' } } } } } }
    patch:  { tags: [catalog], operationId: updateRegulatoryProfile, description: 'Required scope: `catalog.write`.', requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RegulatoryProfile' } } } }, responses: { '200': { description: Updated. } } }
    delete: { tags: [catalog], operationId: deleteRegulatoryProfile, description: 'Required scope: `catalog.write`.', responses: { '204': { description: Soft-deleted. } } }

  # ── Comparisons ──────────────────────────────────────────────────────
  /comparisons:
    get:
      tags: [catalog]
      operationId: listComparisons
      description: 'Required scope: `catalog.read`.'
      parameters: [{ $ref: '#/components/parameters/Cursor' }, { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/FilterName' }, { $ref: '#/components/parameters/FilterTag' }]
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfComparisons' } } } } }
    post:
      tags: [catalog]
      operationId: createComparison
      description: "Required scope: `catalog.write`. Creating a Comparison auto-pins all referenced runs (subject to `max_pinned_runs`)."
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Comparison' } } } }
      responses:
        '201': { description: Created. }
        '429': { $ref: '#/components/responses/RateLimited' }
  /comparisons/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [catalog], operationId: getComparison, description: 'Required scope: `catalog.read`.',    responses: { '200': { description: Comparison., content: { application/json: { schema: { $ref: '#/components/schemas/Comparison' } } } } } }
    patch:  { tags: [catalog], operationId: updateComparison, description: 'Required scope: `catalog.write`.', requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Comparison' } } } }, responses: { '200': { description: Updated. } } }
    delete: { tags: [catalog], operationId: deleteComparison, description: 'Required scope: `catalog.write`.', responses: { '204': { description: Soft-deleted; runs unpinned unless pinned by other Comparisons or directly. } } }

  # ── Measurements ─────────────────────────────────────────────────────
  /measurements:
    get:
      tags: [measurements]
      operationId: listMeasurements
      description: 'Required scope: `measurements.read`.'
      parameters: [{ $ref: '#/components/parameters/Cursor' }, { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/FilterName' }, { $ref: '#/components/parameters/FilterShare' }]
      responses: { '200': { description: Page., content: { application/json: { schema: { $ref: '#/components/schemas/PageOfMeasurementSets' } } } } }
    post:
      tags: [measurements]
      operationId: createMeasurementSet
      description: |
        Required scope: `measurements.write`.
        Inline JSON body or multipart CSV/GeoJSON upload up to 50 MB.
        Larger sets must be uploaded via the asset model (purpose=`measurement_csv`) and referenced by `csv_asset_ref`.
      requestBody:
        required: true
        content:
          application/json:    { schema: { $ref: '#/components/schemas/MeasurementSet' } }
          multipart/form-data: { schema: { type: object, properties: { metadata: { $ref: '#/components/schemas/MeasurementSet' }, file: { type: string, format: binary } } } }
      responses:
        '201': { description: Created. }
        '400': { $ref: '#/components/responses/BadRequest' }
  /measurements/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [measurements], operationId: getMeasurementSet, description: 'Required scope: `measurements.read`.',    responses: { '200': { description: MeasurementSet., content: { application/json: { schema: { $ref: '#/components/schemas/MeasurementSet' } } } } } }
    patch:  { tags: [measurements], operationId: updateMeasurementSet, description: 'Required scope: `measurements.write`.', requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MeasurementSet' } } } }, responses: { '200': { description: Updated. } } }
    delete: { tags: [measurements], operationId: deleteMeasurementSet, description: 'Required scope: `measurements.write`.', responses: { '204': { description: Soft-deleted. } } }
  /measurements/{id}:append:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    post:
      tags: [measurements]
      operationId: appendMeasurements
      description: "Required scope: `measurements.write`. Chunked append for ongoing telemetry. Creates a new Measurement Set version (light copy-on-write); point-level dedup by (lat, lon, altitude_m, freq_mhz, timestamp)."
      parameters:
        - { in: header, name: Idempotency-Key, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json: { schema: { type: array, items: { $ref: '#/components/schemas/MeasurementPoint' } } }
          text/csv:         { schema: { type: string } }
      responses:
        '200': { description: Appended; new version., content: { application/json: { schema: { $ref: '#/components/schemas/MeasurementSet' } } } }
        '422': { $ref: '#/components/responses/Unprocessable' }

  # ── Assets ───────────────────────────────────────────────────────────
  /assets:initiate:
    post:
      tags: [assets]
      operationId: initiateAssetUpload
      description: |
        Required scope: `catalog.write`.
        Begin a content-addressed upload (§3.5). Returns a session document — direct PUT,
        multipart with per-part presigned URLs, or `already_exists: true` (no upload required)
        if an asset with the same SHA-256 is already in the store.
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AssetInitiateRequest' } } } }
      responses:
        '200': { description: Session., content: { application/json: { schema: { $ref: '#/components/schemas/AssetSession' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /assets/{id}:complete:
    parameters: [{ in: path, name: id, required: true, schema: { $ref: '#/components/schemas/AssetId' } }]
    post:
      tags: [assets]
      operationId: completeAssetUpload
      description: 'Required scope: `catalog.write`.'
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/AssetCompleteRequest' } } } }
      responses:
        '200': { description: Asset finalized., content: { application/json: { schema: { $ref: '#/components/schemas/Asset' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
  /assets/{id}:abort:
    parameters: [{ in: path, name: id, required: true, schema: { $ref: '#/components/schemas/AssetId' } }]
    post:
      tags: [assets]
      operationId: abortAssetUpload
      description: 'Required scope: `catalog.write`.'
      responses: { '204': { description: Aborted; uploaded parts reclaimed. } }
  /assets/{id}:refresh_part_urls:
    parameters: [{ in: path, name: id, required: true, schema: { $ref: '#/components/schemas/AssetId' } }]
    post:
      tags: [assets]
      operationId: refreshAssetPartUrls
      description: |
        Reissue presigned PUT URLs for any not-yet-completed parts of a multipart upload (spec §3.5).
        Used when an upload spans more time than the original `expires_at` of one or more parts.
        Already-completed parts are not reissued. Required scope: `catalog.write`.
      responses:
        '200':
          description: Fresh part URLs.
          content:
            application/json:
              schema:
                type: object
                required: [parts]
                properties:
                  parts:
                    type: array
                    items:
                      type: object
                      required: [part_number, upload_url, expires_at]
                      properties:
                        part_number: { type: integer, minimum: 1 }
                        upload_url:  { type: string, format: uri }
                        expires_at:  { type: string, format: date-time }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: 'Upload already completed or aborted.', content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } } }
  /assets/{id}:
    parameters: [{ in: path, name: id, required: true, schema: { $ref: '#/components/schemas/AssetId' } }]
    get:
      tags: [assets]
      operationId: getAssetMetadata
      description: 'Required scope: `catalog.read`.'
      responses:
        '200': { description: Asset metadata., content: { application/json: { schema: { $ref: '#/components/schemas/Asset' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Analyses ─────────────────────────────────────────────────────────
  /analyses/p2p:
    post:
      tags: [analyses]
      operationId: submitOpA
      description: 'Required scope: `runs.submit`.'
      summary: Op A — point-to-point.
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestOpA_P2P' } } } }
      responses:
        '200': { description: Sync run completed.,                  content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } }
        '202': { description: Async (or auto-promoted to async).,   content: { application/json: { schema: { $ref: '#/components/schemas/RunAccepted' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /analyses/area:
    post:
      tags: [analyses]
      operationId: submitOpB
      description: 'Required scope: `runs.submit`.'
      summary: Op B — area heatmap.
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestOpB_Area' } } } }
      responses:
        '200': { description: Sync (small geometries only).,        content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } }
        '202': { description: Async.,                               content: { application/json: { schema: { $ref: '#/components/schemas/RunAccepted' } } } }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /analyses/multi_link:
    post:
      tags: [analyses]
      operationId: submitOpC
      description: 'Required scope: `runs.submit`.'
      summary: Op C — multi-link site report.
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestOpC_MultiLink' } } } }
      responses:
        '200': { description: Sync.,  content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } }
        '202': { description: Async., content: { application/json: { schema: { $ref: '#/components/schemas/RunAccepted' } } } }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /analyses/multi_tx:
    post:
      tags: [analyses]
      operationId: submitOpD
      description: 'Required scope: `runs.submit`.'
      summary: Op D — multi-Tx best-server.
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestOpD_MultiTx' } } } }
      responses:
        '200': { description: Sync.,  content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } }
        '202': { description: Async., content: { application/json: { schema: { $ref: '#/components/schemas/RunAccepted' } } } }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /analyses/voxel:
    post:
      tags: [analyses]
      operationId: submitOpE
      description: 'Required scope: `runs.submit`.'
      summary: Op E — 3D / volumetric coverage.
      description: |
        Op E defaults to async because most voxel runs exceed the sync budget. Callers may force sync via
        `mode: "sync"`; the orchestrator will auto-promote to async on overrun (HTTP 202) per §2.3.
        Required scope: `runs.submit`.
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RequestOpE_Voxel' } } } }
      responses:
        '200':
          description: 'Sync run completed (only when sync mode was explicitly requested and the budget held).'
          content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } }
        '202':
          description: 'Async (default for Op E, or auto-promoted from sync).'
          content: { application/json: { schema: { $ref: '#/components/schemas/RunAccepted' } } }
        '422': { $ref: '#/components/responses/Unprocessable' }

  # ── Runs ─────────────────────────────────────────────────────────────
  /runs/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:
      tags: [runs]
      operationId: getRun
      description: "Required scope: `runs.read`. Required scope: `runs.read` (plus `opsec.read_location_redacted` / `opsec.read_restricted_species` for Runs at the corresponding sensitivity class; spec §8.4, Appendix E.5)."
      responses: { '200': { description: Run record., content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
    patch:
      tags: [runs]
      operationId: patchRun
      description: |
        Mutate a small set of post-submission Run fields (Appendix E.6). Only `sensitivity_class` is allowed,
        and only as an upgrade (more-restrictive); downgrades require an admin scope. Required scope: `runs.write`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sensitivity_class: { $ref: '#/components/schemas/SensitivityClass' }
      responses:
        '200': { description: Updated., content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } }
        '403': { description: Sensitivity downgrade attempted without admin scope., content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/Unprocessable' }
    delete:
      tags: [runs]
      operationId: cancelRun
      description: |
        Cancellation is honored at next stage/sub-stage boundary (§8.1; bounded by `cancellation_check_seconds`,
        with a 60 s hard ceiling). Required scope: `runs.cancel`.
      responses: { '202': { description: Cancellation accepted. }, '404': { $ref: '#/components/responses/NotFound' } }
  /runs/{id}/status:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:
      tags: [runs]
      operationId: getRunStatus
      description: 'Required scope: `runs.read`.'
      responses: { '200': { description: Status with stage progress hints., content: { application/json: { schema: { $ref: '#/components/schemas/RunStatus' } } } } }
  /runs/{id}/replay:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    post:
      tags: [runs]
      operationId: replayRun
      description: |
        Resubmit the original run against the engine major recorded on it. Cross-major requires
        `force_replay_across_major: true` (Appendix E.6). Required scope: `runs.submit`.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force_replay_across_major: { type: boolean, default: false, description: 'Allow the replay to run on a different engine major than the one originally recorded.' }
                reclassify_on_replay:      { type: boolean, default: false, description: 'Re-evaluate Appendix E auto-classification against the current configured restricted-species polygons. When false (default) the replay carries the original Run''s `sensitivity_class`.' }
                mode: { type: string, enum: [sync, async, auto] }
      responses:
        '200': { description: Sync replay completed., content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } }
        '202': { description: Async replay accepted., content: { application/json: { schema: { $ref: '#/components/schemas/RunAccepted' } } } }
        '422': { $ref: '#/components/responses/Unprocessable' }
  /runs/{id}/resume:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    post:
      tags: [runs]
      operationId: resumeRun
      description: |
        Resume a Run that reached the EXPIRED terminal state, picking up at the first incomplete tile
        recorded in `Run.completed_tile_count` (spec §8.1). The Run transitions through the new RESUMING
        state, then back to RUNNING and on to its next terminal state. `resume_count` is incremented
        on the Run record. Required scope: `runs.submit`.
      responses:
        '202': { description: Resume accepted; the run will continue asynchronously., content: { application/json: { schema: { $ref: '#/components/schemas/RunAccepted' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: 'Run is not in EXPIRED.', content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } } }
  /runs/{id}/pin:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    post:
      tags: [runs]
      operationId: pinRun
      description: 'Required scope: `runs.write`.'
      responses: { '200': { description: Pinned., content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } }, '429': { $ref: '#/components/responses/RateLimited' } }
  /runs/{id}/unpin:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    post:
      tags: [runs]
      operationId: unpinRun
      description: 'Required scope: `runs.write`.'
      responses: { '200': { description: Unpinned., content: { application/json: { schema: { $ref: '#/components/schemas/Run' } } } } }
  /runs/{id}/artifacts/{key}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }, { $ref: '#/components/parameters/ArtifactKey' }]
    get:
      tags: [runs]
      operationId: getArtifactMetadata
      description: 'Required scope: `runs.read`.'
      responses: { '200': { description: Artifact reference., content: { application/json: { schema: { $ref: '#/components/schemas/ArtifactRef' } } } }, '404': { $ref: '#/components/responses/NotFound' } }
  /runs/{id}/artifacts/{key}/url:
    parameters: [{ $ref: '#/components/parameters/EntityId' }, { $ref: '#/components/parameters/ArtifactKey' }]
    get:
      tags: [runs]
      operationId: refreshArtifactUrl
      description: "Required scope: `runs.read`. Returns a fresh 15-minute presigned download URL."
      responses:
        '200':
          description: Fresh URL.
          content:
            application/json:
              schema:
                type: object
                required: [download_url, expires_at]
                properties:
                  download_url: { type: string, format: uri }
                  expires_at:   { type: string, format: date-time }
        '404': { $ref: '#/components/responses/NotFound' }
  /runs/{id}/artifacts/{key}:materialize:
    parameters: [{ $ref: '#/components/parameters/EntityId' }, { $ref: '#/components/parameters/ArtifactKey' }]
    post:
      tags: [runs]
      operationId: materializeArtifact
      description: "Required scope: `runs.read`. Materializes a not-yet-built artifact (e.g., a derivative requested after submission) from the persisted canonicals."
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                parameters: { type: object, description: 'Artifact-specific knobs (color_map, contour_levels_db, output_crs, …).' }
      responses:
        '200': { description: Materialized., content: { application/json: { schema: { $ref: '#/components/schemas/ArtifactRef' } } } }
  /runs/{id}/artifacts:rederive:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    post:
      tags: [runs]
      operationId: rederiveArtifact
      description: "Required scope: `runs.read`. Produces a derivative variant from a persisted canonical without re-running propagation."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to]
              properties:
                from: { type: string, enum: [geotiff, voxel, path_profile, best_server_raster] }
                to:   { type: string, enum: [kmz, png_with_worldfile, geojson_contours, rendered_cross_section, geotiff_stack, geotiff] }
                parameters: { type: object }
      responses:
        '200':
          description: Variant produced (cached 24 h).
          content:
            application/json:
              schema:
                type: object
                required: [artifact, cached_until]
                properties:
                  artifact:    { $ref: '#/components/schemas/ArtifactRef' }
                  cached_until: { type: string, format: date-time }
  /runs/{id}/artifacts/voxel/slice:
    parameters:
      - { $ref: '#/components/parameters/EntityId' }
      - { in: query, name: bbox,      schema: { type: string, description: 's,w,n,e' } }
      - { in: query, name: altitudes, schema: { type: string, description: 'comma-separated discrete altitudes, m AGL' } }
      - { in: query, name: altitude_min,  schema: { type: number } }
      - { in: query, name: altitude_max,  schema: { type: number } }
      - { in: query, name: altitude_step, schema: { type: number } }
      - { in: query, name: format,    required: true, schema: { type: string, enum: [geotiff, geotiff_stack, voxel_subset, json_point_grid] } }
      - { in: query, name: color_map, schema: { type: string } }
    get:
      tags: [runs]
      operationId: sliceVoxel
      description: "Required scope: `runs.read`. Server-side slice of a voxel artifact. Falls back to `geotiff_stack` if `voxel` not produced."
      responses:
        '200': { description: Slice artifact reference., content: { application/json: { schema: { $ref: '#/components/schemas/ArtifactRef' } } } }
        '404': { description: VOXEL_NOT_AVAILABLE., content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } } }

  # ── Webhooks ─────────────────────────────────────────────────────────
  /webhooks:
    get:
      tags: [webhooks]
      operationId: listWebhooks
      description: 'Required scope: `admin`.'
      responses: { '200': { description: Webhooks., content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Webhook' } } } } } }
    post:
      tags: [webhooks]
      operationId: createWebhook
      description: "Required scope: `admin`. Triggers a registration challenge POST to the URL; the URL must echo back the challenge within 5 s."
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/WebhookCreate' } } } }
      responses:
        '201': { description: Created and verified., content: { application/json: { schema: { $ref: '#/components/schemas/Webhook' } } } }
        '422': { description: Challenge failed., content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } } }
  /webhooks/{id}:
    parameters: [{ $ref: '#/components/parameters/EntityId' }]
    get:    { tags: [webhooks], operationId: getWebhook, description: 'Required scope: `admin`.',    responses: { '200': { description: Webhook., content: { application/json: { schema: { $ref: '#/components/schemas/Webhook' } } } } } }
    delete: { tags: [webhooks], operationId: deleteWebhook, description: 'Required scope: `admin`.', responses: { '204': { description: Deleted. } } }
  /webhooks/secrets:rotate:
    post:
      tags: [webhooks]
      operationId: rotateWebhookSecret
      description: "Required scope: `admin`. Issues a new HMAC secret. Old secret remains valid for 24 h to allow receiver rollover."
      responses:
        '200':
          description: New secret with grace window.
          content:
            application/json:
              schema:
                type: object
                required: [secret, old_secret_valid_until]
                properties:
                  secret:                 { type: string }
                  old_secret_valid_until: { type: string, format: date-time }

  # ── Ops ──────────────────────────────────────────────────────────────
  /healthz:
    get:
      tags: [ops]
      operationId: healthz
      security: []
      responses: { '200': { description: Process alive. } }
  /readyz:
    get:
      tags: [ops]
      operationId: readyz
      security: []
      responses:
        '200': { description: Ready (all dependencies reachable). }
        '503': { description: Not ready., content: { application/json: { schema: { type: object, properties: { db: { type: boolean }, queue: { type: boolean }, artifact_store: { type: boolean }, geo_data: { type: boolean } } } } } }
  /metrics:
    get:
      tags: [ops]
      operationId: metrics
      security: []
      responses:
        '200':
          description: Prometheus exposition.
          content:
            'text/plain; version=0.0.4': { schema: { type: string } }


webhooks:
  # OpenAPI 3.1 top-level webhooks block — each named entry describes an outbound
  # POST the orchestrator makes against a registered `webhook_url` on a terminal
  # Run state transition (spec §2.4). Receivers MUST verify the
  # `X-Signature: HMAC-SHA256(secret, signed_at + "." + body)` header against
  # the exact bytes received off the wire — see spec §2.4 for the canonicalization
  # contract — and MUST reject `signed_at` deltas > 5 minutes from local time.
  # Webhooks are unauthenticated by the API itself (the receiver authenticates
  # via the HMAC); declared with `security: []` to suppress the global BearerAuth.
  run.completed:
    post:
      summary: Run reached COMPLETED.
      description: |
        Fired when a Run reaches the COMPLETED terminal state at the AOI's maximum
        possible fidelity tier (spec §8.1).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookDelivery' }
      responses:
        '200': { description: Receiver acknowledged delivery. }
        '2XX': { description: Any 2xx is treated as ack; non-2xx triggers retry per spec §2.4. }
  run.partial:
    post:
      summary: Run reached PARTIAL.
      description: |
        Fired when a Run reaches the PARTIAL terminal state — completed below the AOI's
        maximum possible fidelity (spec §5.4 / §8.1). The Run record carries `warnings[]`
        explaining why fidelity was degraded.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookDelivery' }
      responses:
        '200': { description: Receiver acknowledged delivery. }
        '2XX': { description: Any 2xx is treated as ack; non-2xx triggers retry per spec §2.4. }
  run.failed:
    post:
      summary: Run reached FAILED.
      description: |
        Fired when a Run reaches the FAILED terminal state. The delivery's `error` field
        carries the Appendix D error code; `inputs_resolved_sha256` lets receivers correlate
        with idempotency-key replays.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookDelivery' }
      responses:
        '200': { description: Receiver acknowledged delivery. }
        '2XX': { description: Any 2xx is treated as ack; non-2xx triggers retry per spec §2.4. }
  run.cancelled:
    post:
      summary: Run reached CANCELLED.
      description: |
        Fired when a Run reaches the CANCELLED terminal state, either by caller `DELETE`
        or by lease/expiry sweep (spec §8.1). Note UK spelling matches the `CANCELLED` Run
        status enum.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookDelivery' }
      responses:
        '200': { description: Receiver acknowledged delivery. }
        '2XX': { description: Any 2xx is treated as ack; non-2xx triggers retry per spec §2.4. }
  run.expired:
    post:
      summary: Run reached EXPIRED.
      description: |
        Fired when a Run reaches the EXPIRED terminal state — execution time exceeded the
        per-op timeout or the global ceiling (spec §8.1). Tile-checkpointed runs may be
        revived via `POST /v1/runs/{id}/resume`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookDelivery' }
      responses:
        '200': { description: Receiver acknowledged delivery. }
        '2XX': { description: Any 2xx is treated as ack; non-2xx triggers retry per spec §2.4. }


components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Single-tenant API key carried in the standard `Authorization: Bearer <api-key>`
        header (per [ADR-0002 §2](../../adr/0002-argus-alignment-and-auth.md); keys are
        stored at rest as argon2id hashes with an 8-character prefix index, never as
        cleartext). Each key has a scope set assigned by the deployment operator
        (spec §8.4); the API rejects a request whose target operation requires a scope
        the calling key does not carry, with `403` and `code: SCOPE_INSUFFICIENT`.

        Defined scopes:
          - catalog.read       — list/get any catalog entity
          - catalog.write      — create/update/delete (soft) any catalog entity
          - measurements.read  — list/get Measurement Sets
          - measurements.write — create/update/append Measurement Sets
          - runs.submit        — submit analyses, replay, resume
          - runs.read          — read Runs and their artifacts
          - runs.cancel        — cancel a running Run
          - runs.write         — pin/unpin/PATCH Runs
          - opsec.read_location_redacted — read full-precision data on `location_redacted` Runs
          - opsec.read_restricted_species — read full data on, and submit, `restricted_species` Runs (implies opsec.read_location_redacted)
          - admin              — webhook administration, secret rotation

        A scope-of-`catalog.*` placeholder in operation descriptions means
        any of `catalog.read` / `catalog.write` as appropriate for the verb.

  parameters:
    Cursor:        { in: query,  name: cursor,           schema: { type: string } }
    Limit:         { in: query,  name: limit,            schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
    FilterName:    { in: query,  name: name,             schema: { type: string } }
    FilterTag:     { in: query,  name: tag,              schema: { type: string } }
    FilterShare:   { in: query,  name: share,            schema: { type: string, enum: [private, shared, all], default: all } }
    EntityId:      { in: path,   name: id,    required: true, schema: { type: string } }
    ArtifactKey:   { in: path,   name: key,   required: true, schema: { type: string } }
    IdempotencyKey: { in: header, name: Idempotency-Key,  schema: { type: string } }

  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } }
    BadRequest:
      description: Validation failure (schema-level).
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } }
    NotFound:
      description: Not found.
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } }
    Unprocessable:
      description: |
        Schema-valid but semantically invalid: RX_TX_FREQ_MISMATCH,
        OP_C_RX_TEMPLATE_MISSING, LINK_TYPE_NOT_REGISTERED, ANTENNA_OUT_OF_BAND,
        FIDELITY_FLOOR_NOT_MET, IDEMPOTENCY_KEY_BODY_MISMATCH,
        AOI_OUT_OF_BBOX, etc.
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } }
    RateLimited:
      description: Rate limit, storage quota, or pin cap exceeded.
      headers: { Retry-After: { schema: { type: string } } }
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetail' } } }
    PageOfSites:
      description: Page of sites.
      content: { application/json: { schema: { $ref: '#/components/schemas/PageOfSites' } } }

  schemas:

    # ── Shared ────────────────────────────────────────────────────────
    ProblemDetail:
      type: object
      required: [title, status, code]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }
        code:
          type: string
          description: Machine-readable code (Appendix D).
          enum:
            - RX_TX_FREQ_MISMATCH
            - ANTENNA_OUT_OF_BAND
            - OP_C_RX_TEMPLATE_MISSING
            - LINK_TYPE_NOT_REGISTERED
            - FIDELITY_FLOOR_NOT_MET
            - PINNED_MODEL_OUT_OF_RANGE
            - PINNED_MODEL_DATA_TIER_INSUFFICIENT
            - IDEMPOTENCY_KEY_BODY_MISMATCH
            - LAYER_GONE
            - STORAGE_QUOTA_EXCEEDED
            - PINNED_RUN_CAP_EXCEEDED
            - PINNED_RUN_CAP_WOULD_BE_EXCEEDED
            - AOI_OUT_OF_BBOX
            - BBOX_CROSSES_ANTIMERIDIAN_NOT_SUPPORTED
            - BBOX_ORDERING_INVALID
            - UNSUPPORTED_CRS
            - BYO_LAYER_VALIDATION_FAILED
            - VOXEL_NOT_AVAILABLE
            - REPLAY_ACROSS_ENGINE_MAJOR
            - REPLAY_ACROSS_PLUGIN_MAJOR
            - MODEL_PLUGIN_CRASH
            - REGULATORY_LIMIT_EXCEEDED
            - REGULATORY_BAND_UNCOVERED
            - OPSEC_CLASSIFICATION_REQUIRED
            - SCOPE_INSUFFICIENT
            - WEBHOOK_CHALLENGE_FAILED
        warnings:
          type: array
          items:
            type: object
            required: [code]
            properties:
              code:
                type: string
                enum:
                  - FIDELITY_DEGRADED
                  - MODEL_OUT_OF_NOMINAL_FREQ
                  - CLUTTER_TABLE_TAXONOMY_FALLBACK
                  - POLARIZATION_DEFAULTED
                  - DSM_GAP
                  - FETCHED_LAYER_PARTIAL
                  - RESOLUTION_EXCEEDS_DATA
                  - REGULATORY_LIMIT_ADVISORY
                  - REGULATORY_BAND_UNCOVERED_ADVISORY
                  - REGULATORY_LICENSE_NOTICE
                  - OPSEC_AUTO_CLASSIFIED
                  - OPSEC_REDACTION_APPLIED
                  - POLAR_PROJECTION_DEGRADED
                  - MODEL_PLUGIN_MAJOR_DRIFT
                  - LINK_TYPE_PLUGIN_MAJOR_DRIFT
                  - RESUMED_FROM_CHECKPOINT
                  - WORKER_LEASE_LOST
                  - GEOTIFF_STACK_FROM_GEOTIFFS
                  - SCENARIO_FALLBACK
              detail: { type: string }

    FilterReason:
      type: object
      description: |
        Informational filter applied to a Measurement Set point during predicted-vs-observed
        reporting (spec §7.3). Filtered points do not fail the run; they are reported in the
        `filter_reasons` block of the PvO output for transparency.
      required: [code, count]
      properties:
        code:
          type: string
          enum:
            - OBSERVED_METRIC_MISMATCH
            - OBSERVATION_OUT_OF_GEOMETRY
            - OBSERVATION_OUT_OF_FREQ_TOLERANCE
        count:  { type: integer, minimum: 0, description: 'Number of points filtered with this reason.' }
        detail: { type: string }

    PvOReport:
      type: object
      description: |
        Predicted-vs-observed aggregate report block emitted per attached Measurement Set
        when a Run carries one or more `measurement_set_refs` (spec §7.3 step 6). Multiple
        attached sets produce multiple `PvOReport` entries on the same Run; no automatic
        merging across sets. The report is the typed wire shape of the PvO artifact;
        `filter_reasons[]` is populated from `FilterReason` entries enumerated in
        Appendix D.
      required: [measurement_set_ref, n_points_filtered_in, n_points_filtered_out, filter_reasons]
      properties:
        measurement_set_ref: { type: string, description: 'Reference to the Measurement Set this report is for.' }
        n_points_filtered_in:  { type: integer, minimum: 0, description: 'Points retained after all filter passes.' }
        n_points_filtered_out: { type: integer, minimum: 0, description: 'Points removed by any filter pass.' }
        filter_reasons:
          type: array
          description: 'Per-reason counts and detail; one entry per filter code that fired.'
          items: { $ref: '#/components/schemas/FilterReason' }
        mean_error_db:    { type: number, description: 'observed_dbm − predicted_dbm, mean across kept points.' }
        median_error_db:  { type: number }
        rmse_db:          { type: number, minimum: 0 }
        max_abs_error_db: { type: number, minimum: 0 }
        bias_direction:
          type: string
          enum: [optimistic, pessimistic, balanced]
          description: 'Sign of the mean error: predictions above (`optimistic`) or below (`pessimistic`) observed; `balanced` when the mean is within ±1 dB.'
        worst_5_points:
          type: array
          description: 'Five points with the largest |error_db|; useful for spot-debugging.'
          items:
            type: object
            properties:
              lat:               { type: number }
              lon:               { type: number }
              altitude_m:        { type: number }
              altitude_reference: { type: string, enum: [agl, amsl] }
              freq_mhz:          { type: number }
              observed_signal_dbm: { type: number }
              predicted_signal_dbm: { type: number }
              error_db:          { type: number }
        per_class_summary:
          type: array
          description: 'Per-clutter-class error breakdown, when clutter classes are resolvable for kept points.'
          items:
            type: object
            properties:
              class_id:  { type: string }
              n_points:  { type: integer, minimum: 0 }
              mean_error_db: { type: number }
              rmse_db:   { type: number, minimum: 0 }

    RunError:
      type: object
      description: |
        Structured failure record persisted on a FAILED Run (spec §3.3). Distinct from `ProblemDetail`,
        which is the HTTP-response shape: a stored Run failure has no HTTP `status` and may carry plugin /
        stage / cause-chain attribution that ProblemDetail does not. The `code` value is drawn from the same
        Appendix D error enumeration as `ProblemDetail.code`.
      required: [code, detail]
      properties:
        code:
          type: string
          description: 'Machine-readable error code (Appendix D). Same enum as `ProblemDetail.code`.'
        detail: { type: string, description: 'Human-readable failure description.' }
        plugin: { type: string, description: 'Plugin that originated the failure, when applicable (e.g., "ITU-R P.1812", "lora").' }
        stage:  { type: string, description: 'Pipeline stage that was running when the failure occurred (§4.1).' }
        cause_chain:
          type: array
          description: 'Ordered list of upstream causes; first entry is the immediate cause, last is the root.'
          items:
            type: object
            required: [code, detail]
            properties:
              code:   { type: string }
              detail: { type: string }

    ResolvedInputs:
      type: object
      description: |
        Frozen, fully-inlined snapshot of every catalog reference at the SUBMITTED transition
        (spec §3.1, §3.3, §8.3). Each populated field is the inlined snapshot type for that entity
        class; absent fields mean the operation did not reference that class. The object is the input
        to the `inputs_resolved_sha256` canonicalization (§3.3).
      properties:
        sites:                { type: array, items: { $ref: '#/components/schemas/Site' } }
        equipment_profiles:   { type: array, items: { $ref: '#/components/schemas/EquipmentProfile' } }
        radio_profiles:       { type: array, items: { $ref: '#/components/schemas/RadioProfile' } }
        antennas:             { type: array, items: { $ref: '#/components/schemas/Antenna' } }
        aoi_packs:            { type: array, items: { $ref: '#/components/schemas/AOIPack' } }
        operating_volumes:    { type: array, items: { $ref: '#/components/schemas/OperatingVolume' } }
        measurement_sets:     { type: array, items: { $ref: '#/components/schemas/MeasurementSet' } }
        regulatory_profiles:  { type: array, items: { $ref: '#/components/schemas/RegulatoryProfile' } }
        clutter_tables:       { type: array, items: { $ref: '#/components/schemas/ClutterTable' } }
        request:
          type: object
          description: 'The original submitted analysis request body, after default population but before any plugin transformation.'

    Page:
      type: object
      properties:
        next_cursor:    { type: [string, "null"] }
        total_estimate: { type: [integer, "null"] }

    Reference:
      type: object
      required: [ref]
      properties:
        ref:     { type: string, minLength: 1 }
        owner:   { type: string, enum: [self, shared], default: self }
        version:
          oneOf:
            - { type: integer, minimum: 1 }
            - { type: string, enum: [latest] }

    AssetId:
      type: string
      pattern: '^sha256:[0-9a-f]{64}$'
      description: Content-addressed asset identifier with `sha256:` prefix (spec §3.5).

    Sha256Hex:
      type: string
      pattern: '^[0-9a-f]{64}$'
      description: Lowercase hex SHA-256 digest (no `sha256:` prefix). Used in content-hash fields where the raw digest is wanted instead of the asset identifier.

    LatLon:
      type: object
      required: [lat, lon]
      properties:
        lat: { type: number, minimum: -90,  maximum: 90 }
        lon: { type: number, minimum: -180, maximum: 180 }

    LatLonAlt:
      type: object
      required: [lat, lon, altitude_m]
      properties:
        lat: { type: number, minimum: -90,  maximum: 90 }
        lon: { type: number, minimum: -180, maximum: 180 }
        altitude_m:     { type: number }
        altitude_reference: { type: string, enum: [agl, amsl], default: agl }

    Bbox:
      type: object
      required: [south, west, north, east]
      properties:
        south: { type: number, minimum: -90,  maximum: 90 }
        west:  { type: number, minimum: -180, maximum: 180 }
        north: { type: number, minimum: -90,  maximum: 90 }
        east:  { type: number, minimum: -180, maximum: 180 }

    Polygon:
      type: object
      required: [type, coordinates]
      properties:
        type: { const: Polygon }
        coordinates:
          type: array
          minItems: 1
          items:
            type: array
            minItems: 4
            items:
              type: array
              minItems: 2
              maxItems: 3
              items: { type: number }

    Polarization: { type: string, enum: [V, H, RHCP, LHCP, slant-45, dual] }
    LinkType:
      type: string
      minLength: 1
      pattern: '^[a-z][a-z0-9_]*$'
      description: |
        Open string. `generic` is the only built-in core value; other values
        are registered by link-type plugins (spec §4.6). Bundled plugins ship
        `lora`, `lte`, `drone_c2`, `rtk`, and `vhf_telemetry`. Server returns
        LINK_TYPE_NOT_REGISTERED if the value is not registered.
      examples: [generic, lora, lte, drone_c2, rtk, vhf_telemetry]
    FidelityTier: { type: string, enum: [T0_FREE_SPACE, T1_TERRAIN, T2_TERRAIN_PLUS_CLUTTER, T3_SURFACE, T4_SURFACE_PLUS_BUILDINGS] }
    Mode:         { type: string, enum: [sync, async, auto], default: auto }
    PropagationModel: { type: string, enum: [auto, p1812, p526, itm, p528, p530, friis, two_ray], default: auto }
    FadingModel:  { type: string, enum: [auto, rayleigh, rician, lognormal], default: auto }

    # ── Catalog entities ──────────────────────────────────────────────
    Site:
      type: object
      required: [name, lat, lon]
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        lat: { type: number, minimum: -90,  maximum: 90 }
        lon: { type: number, minimum: -180, maximum: 180 }
        ground_elevation_override_m: { type: number }
        default_equipment_refs: { type: array, items: { $ref: '#/components/schemas/Reference' } }
        notes: { type: string }
        tags:  { type: array, items: { type: string } }
        photo_asset_ref: { $ref: '#/components/schemas/AssetId' }

    Antenna:
      type: object
      required: [name, kind, gain_dbi, polarization, applicable_bands]
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        kind:    { type: string, enum: [parametric, pattern_file] }
        gain_dbi: { type: number }
        polarization: { $ref: '#/components/schemas/Polarization' }
        applicable_bands:
          type: array
          minItems: 1
          items:
            type: object
            required: [min_mhz, max_mhz]
            properties:
              min_mhz: { type: number, exclusiveMinimum: 0 }
              max_mhz: { type: number, exclusiveMinimum: 0 }
        applicable_polarizations: { type: array, items: { $ref: '#/components/schemas/Polarization' } }
        pattern_type: { type: string, enum: [omni, sector] }
        h_beamwidth_deg: { type: number }
        v_beamwidth_deg: { type: number }
        electrical_downtilt_deg: { type: number }
        slant_polarization_orientation_deg:
          type: [number, "null"]
          enum: [0, 90, null]
          description: |
            Mechanical orientation of a slant-45 antenna in degrees relative to a chosen reference (0 = +45°, 90 = −45°).
            Only meaningful when `polarization: slant-45`. When null (or omitted) the engine treats slant-45 vs slant-45
            as worst-case 20 dB cross-pol with `POLARIZATION_DEFAULTED` warning (spec §4.5).
        format: { type: string, enum: [msi, adf, ant, csv] }
        pattern_asset_ref: { $ref: '#/components/schemas/AssetId' }
        notes: { type: string }
        tags:  { type: array, items: { type: string } }

    RadioProfile:
      type: object
      required: [name, link_type, freq_mhz, bandwidth_khz, tx_power_dbm, rx_sensitivity_dbm]
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        link_type: { $ref: '#/components/schemas/LinkType' }
        freq_mhz: { type: number, exclusiveMinimum: 0 }
        bandwidth_khz: { type: number, exclusiveMinimum: 0 }
        tx_power_dbm: { type: number }
        rx_sensitivity_dbm: { type: number }
        spreading_factor: { type: integer, minimum: 7, maximum: 12 }
        coding_rate: { type: string }
        band:        { type: string }
        earfcn:      { type: integer }
        mode_label:  { type: string }
        modulation:  { type: string }
        fade_margin_db_target: { type: number }
        propagation_model_pref: { $ref: '#/components/schemas/PropagationModel' }

    EquipmentProfile:
      type: object
      required: [name, radio_ref, antenna_ref, mount_height_m_agl, cable_loss_db]
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        radio_ref:   { $ref: '#/components/schemas/Reference' }
        antenna_ref: { $ref: '#/components/schemas/Reference' }
        mount_height_m_agl: { type: number, minimum: 0 }
        cable_loss_db: { type: number, minimum: 0 }
        cable_loss_curve:
          type: array
          items:
            type: object
            required: [freq_mhz, loss_db]
            properties:
              freq_mhz: { type: number, exclusiveMinimum: 0 }
              loss_db:  { type: number, minimum: 0 }
        azimuth_deg: { type: number, minimum: 0, exclusiveMaximum: 360 }
        mechanical_downtilt_deg: { type: number }
        mfr:   { type: string }
        model: { type: string }
        notes: { type: string }
        tags:  { type: array, items: { type: string } }

    AOILayer:
      type: object
      properties:
        source: { type: string, enum: [bundled, byo, fetched] }
        asset_ref: { $ref: '#/components/schemas/AssetId' }
        upstream_source: { type: string }
        upstream_version: { type: string }
        acquired_at:   { type: string, format: date-time }
        content_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        resolution_m: { type: number }

    AOIPack:
      type: object
      required: [name, bbox]
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        bbox: { $ref: '#/components/schemas/Bbox' }
        layers:
          type: object
          properties:
            dtm:       { $ref: '#/components/schemas/AOILayer' }
            dsm:       { $ref: '#/components/schemas/AOILayer' }
            clutter:   { $ref: '#/components/schemas/AOILayer' }
            buildings: { $ref: '#/components/schemas/AOILayer' }
        clutter_table_ref: { $ref: '#/components/schemas/Reference' }
        resolution_m: { type: number }
        notes: { type: string }
        tags:  { type: array, items: { type: string } }

    ClutterTable:
      type: object
      required: [name, taxonomy_id, class_table]
      description: |
        Per-class clutter attenuation lookup (spec §3.2, §4.5). `class_table` keys are taxonomy class IDs (strings);
        each value carries an `attenuation_db_per_band` map from anchor-frequency-MHz (string) to **dB per 100 m of
        path traversed in that class**, plus a per-class `depolarization_factor` ∈ [0, 1] consumed by the polarization
        mismatch model (§4.5). The engine accumulates attenuation linearly along path segments and interpolates between
        anchor frequencies linearly in dB, falling back to the nearest anchor outside the declared range.
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        taxonomy_id: { type: string }
        class_table:
          type: object
          additionalProperties:
            type: object
            properties:
              label: { type: string }
              attenuation_db_per_band:
                type: object
                description: 'Map: anchor-frequency-MHz (string) → dB per 100 m path in this class.'
                additionalProperties: { type: number }
              depolarization_factor: { type: number, minimum: 0, maximum: 1 }
              notes: { type: string }
        applicable_freq_bands:
          type: array
          items:
            type: object
            properties:
              min_mhz: { type: number, exclusiveMinimum: 0 }
              max_mhz: { type: number, exclusiveMinimum: 0 }
        notes: { type: string }

    OperatingVolume:
      type: object
      description: |
        A 3D region of interest for volumetric coverage analysis (spec §3.2).
        Drone flight envelope is the primary use case; also covers tower
        vertical-pattern surveys, tethered-balloon links, and any other case
        needing per-altitude evaluation.
      required: [name, altitude_min_m, altitude_max_m]
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        bbox:    { $ref: '#/components/schemas/Bbox' }
        polygon: { $ref: '#/components/schemas/Polygon' }
        altitude_min_m:     { type: number, minimum: 0 }
        altitude_max_m:     { type: number, minimum: 0 }
        altitude_reference: { type: string, enum: [agl, amsl], default: agl }
        altitude_step_m:    { type: number, exclusiveMinimum: 0 }
        duration_estimate_min: { type: number }
        home_site_ref:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Return-to-home / launch-recovery anchor (drone-specific semantics).
        host_site_ref:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Operational anchor for non-recovering deployments. Often the same Site as `home_site_ref`; sometimes different; either or both may be omitted.
        notes: { type: string }
        tags:  { type: array, items: { type: string } }

    MeasurementSet:
      type: object
      required: [name, points]
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        ordered: { type: boolean, default: false }
        sensitivity_class: { $ref: '#/components/schemas/SensitivityClass' }
        site_ref: { $ref: '#/components/schemas/Reference' }
        aoi_ref:  { $ref: '#/components/schemas/Reference' }
        device_ref: { $ref: '#/components/schemas/Reference' }
        notes: { type: string }
        csv_asset_ref: { $ref: '#/components/schemas/AssetId' }
        points: { type: array, items: { $ref: '#/components/schemas/MeasurementPoint' } }

    MeasurementPoint:
      type: object
      required: [lat, lon, freq_mhz, observed_signal_dbm, timestamp]
      properties:
        lat: { type: number, minimum: -90,  maximum: 90 }
        lon: { type: number, minimum: -180, maximum: 180 }
        altitude_m: { type: number }
        altitude_reference: { type: string, enum: [agl, amsl] }
        freq_mhz: { type: number, exclusiveMinimum: 0 }
        bandwidth_khz: { type: number }
        observed_signal_dbm: { type: number }
        observed_metric:
          type: string
          enum: [rssi, rsrp, rsrq, sinr, snr, detection_count, bearing_quality]
          description: |
            Metric type. `rssi`/`snr` for `generic` and `lora`; `rsrp`/`rsrq`/`sinr` for `lte`;
            `detection_count`/`bearing_quality` for `vhf_telemetry`. The engine enforces metric-link_type
            coherence per spec §7.3 and emits the `OBSERVED_METRIC_MISMATCH` filter reason for points
            whose metric is incompatible with the matched run's link_type.
        timestamp: { type: string, format: date-time }
        seq: { type: integer, minimum: 0 }
        source: { type: string, enum: [manual, camera_trap_log, drone_telemetry, drive_test, other] }
        uncertainty_db: { type: number }
        tags: { type: array, items: { type: string } }

    Comparison:
      type: object
      required: [name, run_ids]
      properties:
        id:      { type: string, readOnly: true }
        name:    { type: string }
        share:   { type: string, enum: [private, shared], default: private }
        version: { type: integer, readOnly: true }
        run_ids: { type: array, items: { type: string } }
        notes: { type: string }
        winner_run_id: { type: string }
        decision_rationale: { type: string }
        decided_at: { type: string, format: date-time }
        tags: { type: array, items: { type: string } }

    LicenseClass:
      type: string
      enum: [license_exempt, license_required, permit_required, prohibited]
      description: |
        License class for the band, per regulator. `license_exempt` is the only
        class for which `enforce_regulatory: true` will not raise a notice;
        all others raise `REGULATORY_LICENSE_NOTICE` regardless of
        `enforce_regulatory`. (spec §3.7)

    RegulatoryBand:
      type: object
      required: [min_mhz, max_mhz, max_eirp_dbm, license_class]
      properties:
        name:               { type: string, description: 'Display label, e.g., "VHF wildlife telemetry"' }
        min_mhz:            { type: number, exclusiveMinimum: 0 }
        max_mhz:            { type: number, exclusiveMinimum: 0 }
        link_type_hint:     { $ref: '#/components/schemas/LinkType', description: 'Informational; not used for matching.' }
        max_eirp_dbm:       { type: number }
        duty_cycle_pct_max: { type: number, minimum: 0, maximum: 100 }
        bandwidth_khz_max:  { type: number, exclusiveMinimum: 0 }
        license_class:      { $ref: '#/components/schemas/LicenseClass' }
        notes:              { type: string }

    RegulatoryProfile:
      type: object
      description: |
        Per-jurisdiction band/EIRP/license-class rules (spec §3.7).
        Operator-curated. Advisory only — does not constitute licensing advice.
      required: [name, country_code, regulator, bands]
      properties:
        id:           { type: string, readOnly: true }
        name:         { type: string }
        share:        { type: string, enum: [private, shared], default: private }
        version:      { type: integer, readOnly: true }
        country_code: { type: string, pattern: '^[A-Z]{2}$', description: 'ISO-3166-1 alpha-2 country code, e.g., ZA, BW, NA, KE, TZ.' }
        regulator:    { type: string, description: 'Display name of the regulator, e.g., ICASA, BOCRA, CRAN, CA, TCRA.' }
        bands:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/RegulatoryBand' }
        effective_date:        { type: string, format: date }
        superseded_at:         { type: string, format: date }
        regulator_url:         { type: string, format: uri }
        reference_doc_asset_ref: { $ref: '#/components/schemas/AssetId' }
        notes: { type: string }
        tags:  { type: array, items: { type: string } }

    # Page wrappers
    PageOfSites:               { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Site' } } } }] }
    PageOfAntennas:            { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Antenna' } } } }] }
    PageOfRadioProfiles:       { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/RadioProfile' } } } }] }
    PageOfEquipmentProfiles:   { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/EquipmentProfile' } } } }] }
    PageOfAOIPacks:            { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/AOIPack' } } } }] }
    PageOfClutterTables:       { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/ClutterTable' } } } }] }
    PageOfOperatingVolumes:    { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/OperatingVolume' } } } }] }
    PageOfMeasurementSets:     { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/MeasurementSet' } } } }] }
    PageOfComparisons:         { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Comparison' } } } }] }
    PageOfRegulatoryProfiles:  { allOf: [{ $ref: '#/components/schemas/Page' }, { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/RegulatoryProfile' } } } }] }

    # ── Assets ────────────────────────────────────────────────────────
    AssetInitiateRequest:
      type: object
      required: [filename, content_type, size_bytes, sha256, purpose]
      properties:
        filename:     { type: string }
        content_type: { type: string }
        size_bytes:   { type: integer, minimum: 0 }
        sha256:       { $ref: '#/components/schemas/Sha256Hex' }
        purpose:
          type: string
          enum: [antenna_pattern, site_photo, raster_dtm, raster_dsm, raster_clutter, vector_buildings, measurement_csv, generic]

    AssetSession:
      oneOf:
        - $ref: '#/components/schemas/AssetSessionAlready'
        - $ref: '#/components/schemas/AssetSessionDirect'
        - $ref: '#/components/schemas/AssetSessionMultipart'
      discriminator:
        propertyName: mode
        mapping:
          already:   '#/components/schemas/AssetSessionAlready'
          direct:    '#/components/schemas/AssetSessionDirect'
          multipart: '#/components/schemas/AssetSessionMultipart'

    AssetSessionAlready:
      type: object
      required: [asset_id, mode, already_exists, ready]
      properties:
        asset_id:       { $ref: '#/components/schemas/AssetId' }
        mode:           { const: already }
        already_exists: { const: true }
        ready:          { const: true }

    AssetSessionDirect:
      type: object
      required: [asset_id, mode, upload]
      properties:
        asset_id: { $ref: '#/components/schemas/AssetId' }
        mode:     { const: direct }
        upload:
          type: object
          required: [method, url, expires_at]
          properties:
            method:  { const: PUT }
            url:     { type: string, format: uri }
            headers: { type: object, additionalProperties: { type: string } }
            expires_at: { type: string, format: date-time }

    AssetSessionMultipart:
      type: object
      required: [asset_id, mode, part_size_bytes, parts, complete_url, abort_url, refresh_part_urls_url]
      properties:
        asset_id:        { $ref: '#/components/schemas/AssetId' }
        mode:            { const: multipart }
        part_size_bytes: { type: integer, minimum: 5242880 }
        parts:
          type: array
          items:
            type: object
            required: [part_number, upload_url, expires_at]
            properties:
              part_number: { type: integer, minimum: 1 }
              upload_url:  { type: string, format: uri }
              expires_at:  { type: string, format: date-time }
        complete_url:          { type: string, format: uri }
        abort_url:             { type: string, format: uri }
        refresh_part_urls_url: { type: string, format: uri, description: 'POST here to obtain fresh presigned URLs for un-completed parts (spec §3.5).' }

    AssetCompleteRequest:
      type: object
      properties:
        parts:
          type: array
          items:
            type: object
            required: [part_number, etag]
            properties:
              part_number: { type: integer, minimum: 1 }
              etag:        { type: string }

    Asset:
      type: object
      required: [asset_id, content_type, size_bytes, sha256, ready]
      properties:
        asset_id:       { $ref: '#/components/schemas/AssetId' }
        content_type:   { type: string }
        size_bytes:     { type: integer, minimum: 0 }
        sha256:         { $ref: '#/components/schemas/Sha256Hex' }
        ready:          { type: boolean }
        already_exists: { type: boolean }

    # ── Runs ──────────────────────────────────────────────────────────
    Run:
      type: object
      required: [id, status, operation, submitted_by_key, submitted_at]
      properties:
        id: { type: string }
        submitted_by_key:    { type: string }
        submitted_at:        { type: string, format: date-time }
        inputs_resolved_at:  { type: string, format: date-time }
        completed_at:        { type: string, format: date-time }
        status: { type: string, enum: [SUBMITTED, QUEUED, RUNNING, RESUMING, COMPLETED, PARTIAL, FAILED, CANCELLED, EXPIRED] }
        operation: { type: string, enum: [p2p, area, multi_link, multi_tx, voxel] }
        mode_requested: { type: string, enum: [sync, async, auto] }
        mode_executed:  { type: string, enum: [sync, async] }
        inputs_resolved: { $ref: '#/components/schemas/ResolvedInputs' }
        inputs_resolved_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        engine_version: { type: string }
        engine_major:   { type: integer }
        models_used:
          type: array
          description: 'Per-plugin record (both propagation models and link-type plugins). `plugin_major` is read by the replay-major-drift logic in §3.3 / §8.3. `license` and `provenance` make each Run license-auditable from the record alone (ADR-0003). Core-bundled models (free-space, two-ray) record `license: "MIT"`, `provenance: "in-house implementation"`.'
          items:
            type: object
            required: [name, version, plugin_major, license, provenance]
            properties:
              id:             { type: string, pattern: '^[a-z0-9_]+$', description: 'Plugin id (matches the `propagation_model` enum value, or the `link_type` value for link-type plugins).' }
              name:           { type: string, description: 'Plugin human-readable name (e.g., "ITU-R P.1812-7", "lora").' }
              version:        { type: string, description: 'Plugin semver string.' }
              plugin_major:   { type: integer, minimum: 0, description: 'Major version extracted from `version`; replay compares this.' }
              plugin_version: { type: string, description: 'Alias for `version` retained for clarity in cross-language clients.' }
              license:        { type: string, description: 'SPDX id (e.g., "MIT", "Apache-2.0", "PD"). Mandatory; copied from `ModelCapabilities.license`. See ADR-0003.' }
              provenance:     { type: string, description: 'Free-text origin (e.g., "in-house implementation", "ported from NTIA ITS itm v1.4.1 (public domain)", "ported from crc-covlib v1.x (MIT)"). Mandatory; copied from `ModelCapabilities.provenance`. See ADR-0003.' }
        data_layer_versions: { type: array, items: { type: object } }
        fidelity_tier_dominant:     { $ref: '#/components/schemas/FidelityTier' }
        fidelity_tier_min:          { $ref: '#/components/schemas/FidelityTier' }
        fidelity_tier_max:          { $ref: '#/components/schemas/FidelityTier' }
        fidelity_tier_max_possible: { $ref: '#/components/schemas/FidelityTier' }
        output_artifact_refs: { type: array, items: { $ref: '#/components/schemas/ArtifactRef' } }
        pvo_reports:
          type: array
          description: 'Predicted-vs-observed report, one entry per attached Measurement Set (spec §7.3). Empty / absent on Runs that did not attach measurements.'
          items: { $ref: '#/components/schemas/PvOReport' }
        warnings: { type: array, items: { type: object, properties: { code: { type: string }, detail: { type: string } } } }
        error: { $ref: '#/components/schemas/RunError' }
        pinned: { type: boolean }
        cancellation_reason:
          type: [string, "null"]
          enum: [user, expired, null]
          description: |
            Why the Run reached a terminal CANCELLED state. `sync_budget_exceeded` is intentionally
            absent: the Run record itself is never marked cancelled by sync-budget overrun (the underlying Run
            continues running and reaches its own terminal state); `sync_budget_exceeded` only ever appears in the
            HTTP response (`RunAccepted.reason`) per spec §8.1.
        comparison_ids:       { type: array, items: { type: string }, description: 'IDs of every Comparison referencing this Run.' }
        resume_count:         { type: integer, minimum: 0, description: 'Number of times this Run has been resumed from a checkpoint after EXPIRED (spec §8.1).' }
        completed_tile_count: { type: integer, minimum: 0, description: 'Tiles persisted to the canonical artifact so far (Op B/D/E checkpointed runs).' }
        total_tile_count:     { type: [integer, "null"], minimum: 0, description: 'Total tiles in this Run, when known.' }
        replay_of_run_id:     { type: [string, "null"] }
        replay_engine_major_drift: { type: [string, "null"], description: "e.g., '1->2'" }
        replay_plugin_major_drift:
          type: array
          description: 'Per-plugin major-version drift relative to the original Run, when replaying across plugin majors.'
          items:
            type: object
            required: [plugin, drift]
            properties:
              plugin: { type: string, description: 'Plugin name (e.g., "p1812", "lora").' }
              drift:  { type: string, description: "e.g., '2->3'" }
        sensitivity_class:    { $ref: '#/components/schemas/SensitivityClass' }
        regulatory_profile_ref_resolved: { type: [string, "null"], description: 'Convenience pointer into inputs_resolved if a regulatory profile was supplied; null otherwise.' }

    RunAccepted:
      type: object
      required: [run_id, status_url, mode_executed]
      properties:
        run_id:        { type: string }
        status_url:    { type: string, format: uri }
        mode_executed: { const: async }
        reason:        { type: string, enum: [requested, sync_budget_exceeded] }
        webhook_url:   { type: string, format: uri }

    RunStatus:
      type: object
      required: [run_id, status]
      properties:
        run_id: { type: string }
        status: { type: string, enum: [SUBMITTED, QUEUED, RUNNING, RESUMING, COMPLETED, PARTIAL, FAILED, CANCELLED, EXPIRED] }
        stage: { type: string, description: 'Pipeline stage name (§4.1)' }
        stage_progress_pct: { type: number, minimum: 0, maximum: 100 }
        completed_tile_count: { type: integer, minimum: 0 }
        total_tile_count:     { type: [integer, "null"], minimum: 0 }
        started_at: { type: string, format: date-time }

    ArtifactRef:
      type: object
      required: [key, class, content_type, materialized]
      properties:
        key:           { type: string }
        class:         { type: string, enum: [canonical, derivative] }
        content_type:  { type: string }
        size_bytes:    { type: integer, minimum: 0 }
        sha256:
          oneOf:
            - { $ref: '#/components/schemas/Sha256Hex' }
            - { type: "null" }
        expires_at:    { type: string, format: date-time }
        download_url:  { type: [string, "null"], format: uri }
        materialized:  { type: boolean }
        materialize_url: { type: [string, "null"], format: uri }

    # ── Webhooks ──────────────────────────────────────────────────────
    Webhook:
      type: object
      required: [id, url, verified]
      properties:
        id:          { type: string }
        url:         { type: string, format: uri }
        verified:    { type: boolean }
        verified_at: { type: string, format: date-time }
        events:
          type: array
          items: { $ref: '#/components/schemas/WebhookEvent' }

    WebhookCreate:
      type: object
      required: [url]
      properties:
        url:    { type: string, format: uri }
        events:
          type: array
          items: { $ref: '#/components/schemas/WebhookEvent' }

    WebhookEvent:
      type: string
      description: |
        Terminal-state Run transitions (spec §2.4). Webhooks fire only on terminal states;
        the transient RESUMING state does not produce a delivery.
      enum:
        - run.completed
        - run.partial
        - run.failed
        - run.cancelled
        - run.expired

    WebhookDelivery:
      type: object
      description: |
        HMAC-signed payload posted to a registered webhook URL on terminal-state Run transitions
        (spec §2.4). Receivers MUST verify `X-Signature: HMAC-SHA256(secret, signed_at + "." + body)`
        and MUST reject `signed_at` deltas > 5 minutes from local time.
      required: [event, run_id, status, signed_at, delivery_id, signature_alg]
      properties:
        event:                  { $ref: '#/components/schemas/WebhookEvent' }
        run_id:                 { type: string }
        status:                 { type: string, enum: [COMPLETED, PARTIAL, FAILED, CANCELLED, EXPIRED] }
        inputs_resolved_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        signed_at:              { type: string, format: date-time, description: 'RFC 3339 UTC timestamp when the signature was produced.' }
        signature_alg:          { type: string, enum: [HMAC-SHA256] }
        delivery_id:            { type: string, description: 'Unique per-delivery identifier; receivers should dedup on this.' }
        artifacts_url:          { type: string, format: uri }
        warnings:               { type: array, items: { type: object, properties: { code: { type: string }, detail: { type: string } } } }
        error:                  { $ref: '#/components/schemas/ProblemDetail' }

    # ── Analysis Requests ─────────────────────────────────────────────
    OutputKey:
      type: string
      minLength: 1
      pattern: '^[a-z][a-z0-9_]*$'
      description: |
        Output artifact key. Core keys are universal; per-link-type semantic
        keys are declared by link-type plugins (spec §4.6). Server validates
        against the union of core keys and currently-registered plugin
        outputs. The `examples` list captures core keys plus bundled-plugin
        outputs as of v1; the schema is intentionally not closed so additional
        plugins can ship without an OpenAPI revision.
      examples:
        - link_budget
        - path_profile
        - geotiff
        - geotiff_stack
        - voxel
        - geojson_contours
        - kmz
        - png_with_worldfile
        - rendered_cross_section
        - stats
        - best_server_raster
        - fidelity_tier_raster
        - point_query
        - lora_snr_margin
        - lora_best_sf
        - lora_link_metrics
        - lte_rsrp
        - lte_rsrq
        - lte_sinr
        - lte_mcs_feasibility
        - c2_pass_fail
        - c2_range_envelope
        - rtk_pass_fail
        - rtk_range_envelope
        - vhf_detection_probability
        - vhf_bearing_quality
        - vhf_range_envelope

    MinFidelityCoverage:
      type: object
      required: [tier, fraction]
      properties:
        tier:     { $ref: '#/components/schemas/FidelityTier' }
        fraction: { type: number, exclusiveMinimum: 0, maximum: 1 }

    ColorMap:
      oneOf:
        - { type: string, description: 'Named colormap.' }
        - type: object
          required: [stops]
          properties:
            stops:
              type: array
              minItems: 2
              items:
                type: object
                required: [value, rgba]
                properties:
                  value: { type: number }
                  rgba:  { type: array, items: { type: integer, minimum: 0, maximum: 255 }, minItems: 4, maxItems: 4 }
            nodata: { type: array, items: { type: integer, minimum: 0, maximum: 255 }, minItems: 4, maxItems: 4 }

    SiteOrInline:
      description: 'Reference, inline Site, or bare {lat, lon}. Spec §2.3.'
      oneOf:
        - { $ref: '#/components/schemas/Reference' }
        - { $ref: '#/components/schemas/Site' }
        - { $ref: '#/components/schemas/LatLon' }

    EquipmentOrInline:
      oneOf:
        - { $ref: '#/components/schemas/Reference' }
        - { $ref: '#/components/schemas/EquipmentProfile' }

    AOIOrInline:
      oneOf:
        - { $ref: '#/components/schemas/Reference' }
        - { $ref: '#/components/schemas/AOIPack' }

    OperatingVolumeOrInline:
      oneOf:
        - { $ref: '#/components/schemas/Reference' }
        - { $ref: '#/components/schemas/OperatingVolume' }

    RegulatoryOrInline:
      oneOf:
        - { $ref: '#/components/schemas/Reference' }
        - { $ref: '#/components/schemas/RegulatoryProfile' }

    SensitivityClass:
      type: string
      enum: [public, org_internal, location_redacted, restricted_species]
      description: |
        Operational sensitivity classification for the Run and its artifacts
        (Appendix E). Defaults to the deployment's configured default
        (typically `org_internal`). May be auto-promoted at submission time
        when the resolved geometry intersects a configured restricted-species
        polygon (`OPSEC_AUTO_CLASSIFIED` warning).

    AnalysisCommon:
      type: object
      properties:
        outputs: { type: array, minItems: 1, uniqueItems: true, items: { $ref: '#/components/schemas/OutputKey' } }
        mode:                { $ref: '#/components/schemas/Mode' }
        propagation_model:   { $ref: '#/components/schemas/PropagationModel' }
        fading_model:        { $ref: '#/components/schemas/FadingModel' }
        fading_params:       { type: object }
        min_fidelity_tier:   { $ref: '#/components/schemas/FidelityTier' }
        min_fidelity_coverage: { $ref: '#/components/schemas/MinFidelityCoverage' }
        color_map:           { $ref: '#/components/schemas/ColorMap' }
        contour_levels_db:   { type: array, items: { type: number } }
        output_crs:          { type: string }
        voxel_lossless:      { type: boolean, default: false }
        measurement_set_refs: { type: array, items: { $ref: '#/components/schemas/Reference' } }
        freq_tolerance_mhz:  { type: number, exclusiveMinimum: 0 }
        dedupe:              { type: boolean, default: false }
        webhook_url:         { type: string, format: uri }
        point_query_locations: { type: array, items: { $ref: '#/components/schemas/LatLonAlt' } }
        regulatory_profile_ref: { $ref: '#/components/schemas/RegulatoryOrInline' }
        enforce_regulatory:    { type: boolean, default: false, description: 'When true, regulatory band/EIRP violations promote from warnings to errors. License notices remain advisory either way (spec §3.7).' }
        sensitivity_class:     { $ref: '#/components/schemas/SensitivityClass' }

    TxSiteEntry:
      type: object
      required: [site, equipment]
      properties:
        site:      { $ref: '#/components/schemas/SiteOrInline' }
        equipment: { $ref: '#/components/schemas/EquipmentOrInline' }

    RxTemplateEntry:
      type: object
      required: [link_type, equipment]
      properties:
        link_type: { $ref: '#/components/schemas/LinkType' }
        equipment: { $ref: '#/components/schemas/EquipmentOrInline' }

    RequestOpA_P2P:
      allOf:
        - $ref: '#/components/schemas/AnalysisCommon'
        - type: object
          required: [operation, tx_site, tx_equipment, rx_site, rx_equipment, outputs]
          properties:
            operation:    { const: p2p }
            tx_site:      { $ref: '#/components/schemas/SiteOrInline' }
            tx_equipment: { $ref: '#/components/schemas/EquipmentOrInline' }
            rx_site:      { $ref: '#/components/schemas/SiteOrInline' }
            rx_equipment: { $ref: '#/components/schemas/EquipmentOrInline' }
            aoi:          { $ref: '#/components/schemas/AOIOrInline' }

    RequestOpB_Area:
      allOf:
        - $ref: '#/components/schemas/AnalysisCommon'
        - type: object
          required: [operation, tx_site, tx_equipment, rx_template, aoi, resolution_m, outputs]
          properties:
            operation:    { const: area }
            tx_site:      { $ref: '#/components/schemas/SiteOrInline' }
            tx_equipment: { $ref: '#/components/schemas/EquipmentOrInline' }
            rx_template:  { $ref: '#/components/schemas/EquipmentOrInline' }
            rx_altitude_override_m_agl: { type: number }
            aoi:          { $ref: '#/components/schemas/AOIOrInline' }
            resolution_m: { type: number, exclusiveMinimum: 0 }

    RequestOpC_MultiLink:
      allOf:
        - $ref: '#/components/schemas/AnalysisCommon'
        - type: object
          required: [operation, tx_site, rx_templates, aoi, resolution_m, outputs]
          properties:
            operation:           { const: multi_link }
            tx_site:             { $ref: '#/components/schemas/SiteOrInline' }
            tx_equipment_refs:
              type: array
              items: { $ref: '#/components/schemas/EquipmentOrInline' }
              description: Defaults to the resolved tx_site.default_equipment_refs[].
            rx_templates:
              type: array
              minItems: 1
              items: { $ref: '#/components/schemas/RxTemplateEntry' }
              description: |
                Exactly one entry per distinct link_type present in the resolved Tx set.
                Server returns OP_C_RX_TEMPLATE_MISSING if a Tx has no matching template.
            aoi:                 { $ref: '#/components/schemas/AOIOrInline' }
            resolution_m:        { type: number, exclusiveMinimum: 0 }
            combined_site_score:
              type: object
              properties:
                weights_per_link_type:
                  type: object
                  additionalProperties: { type: number, minimum: 0 }

    RequestOpD_MultiTx:
      allOf:
        - $ref: '#/components/schemas/AnalysisCommon'
        - type: object
          required: [operation, tx_sites, rx_template, aoi, resolution_m, outputs]
          properties:
            operation:    { const: multi_tx }
            tx_sites:
              type: array
              minItems: 2
              items: { $ref: '#/components/schemas/TxSiteEntry' }
              description: Tx index in this array is the value emitted in best_server_raster (1-indexed; 0 = NoData).
            rx_template:  { $ref: '#/components/schemas/EquipmentOrInline' }
            aoi:          { $ref: '#/components/schemas/AOIOrInline' }
            resolution_m: { type: number, exclusiveMinimum: 0 }

    RequestOpE_Voxel:
      allOf:
        - $ref: '#/components/schemas/AnalysisCommon'
        - type: object
          required: [operation, tx_sites, rx_template, outputs]
          oneOf:
            - { required: [operating_volume] }
            - { required: [aoi, altitude_step_m] }
          properties:
            operation:        { const: voxel }
            tx_sites:
              type: array
              minItems: 1
              items: { $ref: '#/components/schemas/TxSiteEntry' }
            rx_template:      { $ref: '#/components/schemas/EquipmentOrInline' }
            operating_volume: { $ref: '#/components/schemas/OperatingVolumeOrInline' }
            aoi:              { $ref: '#/components/schemas/AOIOrInline' }
            resolution_m:     { type: number, exclusiveMinimum: 0 }
            altitude_step_m:       { type: number, exclusiveMinimum: 0 }
